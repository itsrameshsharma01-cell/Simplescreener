name: Daily Elite Screener

on:
  schedule:
    # 9:30 AM IST
    - cron: '0 4 * * 1-5'
    # 9:45 AM IST
    - cron: '15 4 * * 1-5'
    # 10:00 AM IST
    - cron: '30 4 * * 1-5'
    # 11:00 AM IST
    - cron: '30 5 * * 1-5'
    # 3:00 PM IST
    - cron: '30 9 * * 1-5'
    # 4:00 PM IST
    - cron: '30 10 * * 1-5'
  workflow_dispatch:

jobs:
  run-screener:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Daily Screener
      run: |
        python screener.py
        
    - name: Commit and Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add daily_screener_results.csv index.html
        # If there are changes, commit them
        git diff --staged --quiet || git commit -m "Auto-update daily screener data"
        git push
