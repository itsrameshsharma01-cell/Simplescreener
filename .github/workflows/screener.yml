name: Daily Elite Screener

on:
  schedule:
    # Runs at 11:30 UTC every weekday (Mon-Fri)
    # 11:30 UTC is 5:00 PM IST (after the Indian market closes)
    - cron: '30 11 * * 1-5'
  workflow_dispatch: # Allows you to manually trigger a run from the GitHub UI

jobs:
  run-screener:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Daily Screener
      run: |
        python screener.py
        
    - name: Commit and Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add daily_screener_results.csv index.html
        # If there are changes, commit them
        git diff --staged --quiet || git commit -m "Auto-update daily screener data"
        git push
